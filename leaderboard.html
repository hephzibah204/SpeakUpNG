<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nigerian Official Rankings - evote.ng Leaderboard</title>
<meta name="description" content="View evote.ng's live leaderboard of Nigerian public officials ranked by citizen ratings, participation volume, and accountability trends.">
<meta name="keywords" content="Nigeria official rankings, governance scorecard, citizen ratings leaderboard, evote.ng rankings">
<meta name="robots" content="index,follow,max-image-preview:large">
<link rel="canonical" href="/leaderboard" id="canonical-link">
<meta property="og:type" content="website">
<meta property="og:site_name" content="evote.ng">
<meta property="og:locale" content="en_NG">
<meta property="og:title" content="evote.ng Leaderboard - Nigerian Official Rankings">
<meta property="og:description" content="Explore the best rated, most rated, and trending Nigerian public officials on evote.ng.">
<meta property="og:image" content="/images/logo.png">
<meta property="og:url" content="/leaderboard" id="og-url">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="evote.ng Leaderboard - Nigerian Official Rankings">
<meta name="twitter:description" content="Explore the best rated, most rated, and trending Nigerian public officials on evote.ng.">
<meta name="twitter:image" content="/images/logo.png">
<link rel="stylesheet" href="css/style.css">
<script>
  (function setCanonicalMeta() {
    var origin = window.location.origin || '';
    var path = '/leaderboard';
    var url = origin + path;
    var canonical = document.getElementById('canonical-link');
    var ogUrl = document.getElementById('og-url');
    if (canonical) canonical.href = url;
    if (ogUrl) ogUrl.setAttribute('content', url);
  })();
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "evote.ng Leaderboard",
  "url": "/leaderboard",
  "description": "Rankings of Nigerian public officials by citizen ratings and engagement.",
  "inLanguage": "en-NG"
}
</script>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo"><img src="/images/logo.png" alt="evote.ng logo"></a>
  <button class="nav-toggle" id="nav-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
  <div class="nav-links" id="nav-links">
    <a href="/" class="nav-link show-mobile">Officials</a>
    <a href="/agencies" class="nav-link">Agencies</a>
    <a href="/leaderboard" class="nav-link active">Rankings</a>
    <a href="/polls" class="nav-link">Polls</a>
    <a href="/blog" class="nav-link">Blog</a>
    <a href="/news" class="nav-link">News</a>
  </div>
</nav>
<div class="toast" id="toast"></div>

<div class="section">
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">🏆 Performance Rankings</h1>
      <p class="page-sub">Officials ranked by citizen ratings. Updated in real-time.</p>
    </div>

    <div class="tabs" id="lb-tabs">
      <button class="tab active" data-mode="most_rated">Most Rated</button>
      <button class="tab" data-mode="best">Best Rated</button>
      <button class="tab" data-mode="worst">Worst Rated</button>
      <button class="tab" data-mode="mandate_best">Best Mandate</button>
      <button class="tab" data-mode="federal_executive">Federal Exec</button>
      <button class="tab" data-mode="state_executive">Governors</button>
      <button class="tab" data-mode="federal_legislature">Legislature</button>
      <button class="tab" data-mode="federal_agency">Agencies</button>
    </div>

    <div style="overflow-x:auto;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);">
      <table class="lb-table">
        <thead>
          <tr>
            <th style="width:42px;">#</th>
            <th>Official</th>
            <th>Role</th>
            <th>Score</th>
            <th>Mandate</th>
            <th>Ratings</th>
            <th>Reports</th>
            <th>Tier</th>
          </tr>
        </thead>
        <tbody id="lb-body">
          <tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- Score legend -->
    <div id="score-legend" style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:1.5rem;font-size:.78rem;color:var(--muted);"></div>
  </div>
</div>

<footer class="site-footer">
  <strong>evote.ng</strong> — All ratings are submitted anonymously by citizens<br>
  <a href="/blog" style="color:var(--green-light);">Blog</a> ·
  <a href="/news" style="color:var(--green-light);">News</a> ·
  <a href="/polls" style="color:var(--green-light);">Polls</a>
</footer>

<script type="module">
import { supabase, TIER_LABELS, TIER_COLORS, scoreColor, fmt } from './js/supabase-client.js';

let mode = 'most_rated';

function renderLegend() {
  const el = document.getElementById('score-legend');
  if (!el) return;
  if (mode === 'mandate_best') {
    el.innerHTML = [
      `<span>⬤ <span style="color:#00b368;">80–100</span> Strong delivery</span>`,
      `<span>⬤ <span style="color:#e8a020;">60–79</span> Mixed</span>`,
      `<span>⬤ <span style="color:#e87720;">40–59</span> Weak</span>`,
      `<span>⬤ <span style="color:#e84040;">0–39</span> Poor</span>`,
      `<span>⬤ <span style="color:var(--muted);">—</span> Not available</span>`,
    ].join('');
    return;
  }
  const bands = [
    { min: 4.0, max: 5.0, label: 'Excellent', color: '#00b368' },
    { min: 3.0, max: 3.9, label: 'Average', color: '#e8a020' },
    { min: 2.0, max: 2.9, label: 'Poor', color: '#e87720' },
    { min: 1.0, max: 1.9, label: 'Very Poor', color: '#e84040' },
  ];
  el.innerHTML =
    bands.map((b) => `<span>⬤ <span style="color:${b.color};">${b.min.toFixed(1)}–${b.max.toFixed(1)}</span> ${b.label}</span>`).join('') +
    `<span>⬤ <span style="color:var(--muted);">—</span> Not yet rated</span>`;
}

function avatarImgStyle(tier) {
  return String(tier || '').includes('agency')
    ? 'width:100%;height:100%;border-radius:50%;object-fit:contain;background:#fff;padding:4px;'
    : 'width:100%;height:100%;border-radius:50%;object-fit:cover;';
}

const AGENCY_HEAD_ROLE_RE = /minister|commissioner|director general|\bdg\b|managing director|\bmd\b|ceo|executive secretary|chairman|comptroller-?general|inspector general|administrator|head/i;
const AGENCY_ORG_NAME_RE = /agency|authority|commission|corporation|company|plc|ltd|limited|board|service|department|ministry|bureau|office|council|secretariat|bank|electricity|distribution|transmission|power|disco|discos|nnpc|nafdac/i;
function agencyLike(o) {
  return String(o?.tier || '').includes('agency');
}
function isAgencyBodyName(name) {
  const s = String(name || '').trim();
  if (!s) return false;
  const lower = s.toLowerCase();
  if (AGENCY_ORG_NAME_RE.test(lower)) return true;
  if (/^[A-Z0-9]{2,12}$/.test(s)) return true;
  return false;
}
function isAgencyHead(o) {
  if (!agencyLike(o)) return false;
  if (AGENCY_HEAD_ROLE_RE.test(String(o?.role || ''))) return true;
  return !isAgencyBodyName(o?.full_name);
}
function isAgencyBody(o) {
  return agencyLike(o) && isAgencyBodyName(o?.full_name) && !AGENCY_HEAD_ROLE_RE.test(String(o?.role || ''));
}

function slugifyOfficialName(name) {
  return String(name || '')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .replace(/-{2,}/g, '-');
}

function supportsPrettyRoutes() {
  const host = String(window.location.hostname || '').toLowerCase();
  if (window.location.protocol === 'file:') return false;
  if (host === 'localhost' || host === '127.0.0.1') return false;
  return true;
}

function officialPath(o) {
  if (!supportsPrettyRoutes()) return `/official.html?id=${encodeURIComponent(o.id)}`;
  const common = String(o?.common_name || '').trim();
  const useCommon = agencyLike(o) && common && /^[A-Za-z0-9]{2,12}$/.test(common);
  const slug = slugifyOfficialName(useCommon ? common : (o.full_name || o.common_name || 'official')) || 'official';
  return `/official/${slug}--${o.id}`;
}

function mandateColor(score) {
  const s = Number(score);
  if (!Number.isFinite(s) || s <= 0) return 'var(--muted)';
  if (s >= 80) return '#00b368';
  if (s >= 60) return '#e8a020';
  if (s >= 40) return '#e87720';
  return '#e84040';
}

async function loadLB() {
  document.getElementById('lb-body').innerHTML = '<tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>';

  let q = supabase.from('officials')
    .select('id,full_name,common_name,role,tier,photo_url,party,report_count,states(name)')
    .eq('status','active');

  const tierModes = ['federal_executive','state_executive','federal_legislature','federal_agency'];
  if (tierModes.includes(mode)) q = q.eq('tier', mode);

  q = q.limit(100);
  const { data: rawOfficials, error } = await q;
  if (error || !rawOfficials) { document.getElementById('lb-body').innerHTML='<tr><td colspan="8"><div class="empty">Error loading data.</div></td></tr>'; return; }

  let officials = rawOfficials || [];
  if (mode === 'federal_agency') {
    officials = officials.filter((o) => isAgencyBody(o));
  }

  if (!officials.length) { document.getElementById('lb-body').innerHTML='<tr><td colspan="8"><div class="empty">No officials found for this filter.</div></td></tr>'; return; }

  // Live aggregation from submitted ratings (not precomputed table fields).
  const ids = officials.map((o) => o.id).filter(Boolean);
  const { data: ratings, error: ratingErr } = await supabase
    .from('public_ratings')
    .select('official_id,overall')
    .in('official_id', ids);
  if (ratingErr) {
    document.getElementById('lb-body').innerHTML='<tr><td colspan="8"><div class="empty">Error loading rating data.</div></td></tr>';
    return;
  }

  const byOfficial = new Map();
  (ratings || []).forEach((r) => {
    const id = r.official_id;
    if (!id) return;
    const score = Number(r.overall || 0);
    if (!Number.isFinite(score) || score <= 0) return;
    if (!byOfficial.has(id)) byOfficial.set(id, { sum: 0, count: 0 });
    const bucket = byOfficial.get(id);
    bucket.sum += score;
    bucket.count += 1;
  });

  const mandateByOfficial = new Map();
  const mandateRes = await supabase
    .from('official_mandate_scores')
    .select('official_id,mandate_score,total_promises')
    .in('official_id', ids);
  if (!mandateRes.error && Array.isArray(mandateRes.data)) {
    mandateRes.data.forEach((row) => {
      if (!row?.official_id) return;
      mandateByOfficial.set(row.official_id, row);
    });
  }

  const data = officials.map((o) => {
    const agg = byOfficial.get(o.id) || { sum: 0, count: 0 };
    const rating_count = agg.count || 0;
    const rating_avg = rating_count ? (agg.sum / rating_count) : 0;
    const m = mandateByOfficial.get(o.id) || null;
    return { ...o, rating_count, rating_avg, mandate_score: m?.mandate_score ?? null, mandate_promises: m?.total_promises ?? null };
  });

  if (mode === 'mandate_best') {
    const withMandate = data.filter((o) => Number.isFinite(Number(o.mandate_score)));
    withMandate.sort((a, b) => {
      if (Number(b.mandate_score || 0) !== Number(a.mandate_score || 0)) return Number(b.mandate_score || 0) - Number(a.mandate_score || 0);
      if ((b.rating_count || 0) !== (a.rating_count || 0)) return (b.rating_count || 0) - (a.rating_count || 0);
      return (b.rating_avg || 0) - (a.rating_avg || 0);
    });
    data.length = 0;
    data.push(...withMandate);
  } else if (mode === 'best') {
    data.sort((a, b) => {
      if ((b.rating_avg || 0) !== (a.rating_avg || 0)) return (b.rating_avg || 0) - (a.rating_avg || 0);
      return (b.rating_count || 0) - (a.rating_count || 0);
    });
  } else if (mode === 'worst') {
    const rated = data.filter((o) => (o.rating_count || 0) > 0);
    rated.sort((a, b) => {
      if ((a.rating_avg || 0) !== (b.rating_avg || 0)) return (a.rating_avg || 0) - (b.rating_avg || 0);
      return (b.rating_count || 0) - (a.rating_count || 0);
    });
    data.length = 0;
    data.push(...rated);
  } else {
    data.sort((a, b) => {
      if ((b.rating_count || 0) !== (a.rating_count || 0)) return (b.rating_count || 0) - (a.rating_count || 0);
      return (b.rating_avg || 0) - (a.rating_avg || 0);
    });
  }

  document.getElementById('lb-body').innerHTML = data.map((o,i) => {
    const initials = o.full_name.split(' ').slice(0,2).map(w=>w[0]).join('');
    const color = TIER_COLORS[o.tier]||'#888';
    const tier = TIER_LABELS[o.tier]||o.tier;
    const rating = parseFloat(o.rating_avg)||0;
    const sc = rating ? scoreColor(rating) : 'var(--muted)';
    const mandate = Number(o.mandate_score);
    const mandateVal = Number.isFinite(mandate) ? Math.round(mandate) : null;
    const mc = mandateVal !== null ? mandateColor(mandateVal) : 'var(--muted)';
    const rankCls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    return `
    <tr>
      <td><span class="lb-rank ${rankCls}">#${i+1}</span></td>
      <td>
        <div class="lb-name-cell">
          <div class="avatar" style="width:36px;height:36px;font-size:.8rem;background:${color}22;color:${color};">
            ${o.photo_url?`<img src="${o.photo_url}" style="${avatarImgStyle(o.tier)}">`:`${initials}`}
          </div>
          <div>
            <a href="${officialPath(o)}" style="font-weight:500;font-size:.88rem;color:var(--white);text-decoration:none;" onmouseover="this.style.color='var(--green-light)'" onmouseout="this.style.color='var(--white)'">${o.full_name}</a>
            <div style="font-size:.72rem;color:var(--muted);">${o.states?.name||'Federal'}</div>
          </div>
        </div>
      </td>
      <td style="color:var(--muted);font-size:.8rem;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${o.role}</td>
      <td><span class="score-pill" style="color:${sc};">${rating ? '★ '+rating.toFixed(1) : '—'}</span></td>
      <td><span class="score-pill" style="color:${mc};">${mandateVal !== null ? `${mandateVal}` : '—'}</span></td>
      <td style="color:var(--muted);">${fmt(o.rating_count)}</td>
      <td>${o.report_count > 0 ? `<span style="color:#e57368;font-size:.82rem;">⚠ ${o.report_count}</span>` : '<span style="color:var(--border);">—</span>'}</td>
      <td><span class="tier-badge" style="color:${color};border-color:${color}44;background:${color}11;font-size:.6rem;">${tier}</span></td>
    </tr>`;
  }).join('');
}

document.querySelectorAll('#lb-tabs .tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#lb-tabs .tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    renderLegend();
    loadLB();
  });
});

loadLB();
renderLegend();
</script>
<script>
(function () {
  const toggle = document.getElementById('nav-toggle');
  const links = document.getElementById('nav-links');
  if (!toggle || !links) return;
  const closeMenu = () => {
    links.classList.remove('open');
    toggle.textContent = '☰';
    toggle.setAttribute('aria-expanded', 'false');
  };
  toggle.addEventListener('click', () => {
    const open = links.classList.toggle('open');
    toggle.textContent = open ? '✕' : '☰';
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  links.querySelectorAll('a').forEach((a) => a.addEventListener('click', closeMenu));
})();
</script>
</body>
</html>
