<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News - evote.ng</title>
<meta name="description" content="Read the full news summary and extracted details with a link to the original source.">
<meta name="robots" content="index,follow,max-image-preview:large">
<link rel="canonical" href="/news-item" id="canonical-link">
<meta property="og:type" content="article">
<meta property="og:site_name" content="evote.ng">
<meta property="og:locale" content="en_NG">
<meta property="og:title" content="News - evote.ng" id="og-title">
<meta property="og:description" content="Read the full news summary and extracted details with a link to the original source." id="og-description">
<meta property="og:image" content="/images/logo.png" id="og-image">
<meta property="og:url" content="/news-item" id="og-url">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="News - evote.ng" id="twitter-title">
<meta name="twitter:description" content="Read the full news summary and extracted details with a link to the original source." id="twitter-description">
<meta name="twitter:image" content="/images/logo.png" id="twitter-image">
<link rel="stylesheet" href="/css/style.css">
<script>
  (function setCanonicalMeta(){
    var origin = window.location.origin || '';
    var params = new URLSearchParams(window.location.search);
    var id = params.get('id') || '';
    var url = origin + '/news-item' + (id ? ('?id=' + encodeURIComponent(id)) : '');
    var canonical = document.getElementById('canonical-link');
    var ogUrl = document.getElementById('og-url');
    if (canonical) canonical.href = url;
    if (ogUrl) ogUrl.setAttribute('content', url);
  })();
</script>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo"><img src="/images/logo.png" alt="evote.ng logo"></a>
  <div class="nav-links">
    <a href="/" class="nav-link show-mobile">Officials</a>
    <a href="/agencies" class="nav-link">Agencies</a>
    <a href="/politicians" class="nav-link">Politicians</a>
    <a href="/leaderboard" class="nav-link">Rankings</a>
    <a href="/polls" class="nav-link">Polls</a>
    <a href="/blog" class="nav-link">Blog</a>
    <a href="/news" class="nav-link active">News</a>
  </div>
</nav>

<div class="toast" id="toast"></div>

<div class="section">
  <div class="container" style="max-width:980px;">
    <div class="page-header" style="border:none;padding-bottom:0;display:flex;justify-content:space-between;gap:1rem;align-items:flex-end;flex-wrap:wrap;">
      <div>
        <h1 class="page-title" id="title">Loading…</h1>
        <p class="page-sub" id="meta"></p>
      </div>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap;">
        <a href="/news" class="btn btn-ghost">← Back to Politics Feed</a>
        <a href="#" id="original-link" class="btn btn-green" target="_blank" rel="noopener noreferrer" style="display:none;">Original Source →</a>
      </div>
    </div>

    <div class="card" style="margin-top:1rem;">
      <div style="display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;margin-bottom:.8rem;">
        <span id="source-pill" class="report-tag on" style="display:none;"></span>
        <span id="tier-pill" class="report-tag" style="display:none;"></span>
        <span id="topic-pill" class="report-tag" style="display:none;"></span>
        <span id="sentiment-pill" class="report-tag" style="display:none;"></span>
      </div>
      <div id="hero" style="display:none;margin-bottom:1rem;"></div>
      <div id="summary" style="font-size:.95rem;line-height:1.9;color:var(--white);"></div>
      <div id="details" style="margin-top:1rem;color:rgba(255,255,255,.88);font-size:.9rem;line-height:1.8;"></div>
    </div>
  </div>
</div>

<script type="module">
import { supabase, showToast } from './js/supabase-client.js';

const params = new URLSearchParams(window.location.search);
const id = (params.get('id') || '').trim();
if (!id) window.location.replace('/news');

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g,(c)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function sanitizeUrl(url){
  const s = String(url||'').trim();
  if(!s) return '';
  try{
    const u = new URL(s, window.location.origin);
    if(!/^https?:$/.test(u.protocol)) return '';
    return u.href;
  }catch{return ''}
}

function setMetaTitle(t){
  const title = String(t||'News');
  document.title = `${title} - evote.ng`;
  const ogT = document.getElementById('og-title');
  const twT = document.getElementById('twitter-title');
  if (ogT) ogT.setAttribute('content', title);
  if (twT) twT.setAttribute('content', title);
}

function setMetaDesc(d){
  const desc = String(d||'').slice(0, 220);
  const ogD = document.getElementById('og-description');
  const twD = document.getElementById('twitter-description');
  if (ogD) ogD.setAttribute('content', desc);
  if (twD) twD.setAttribute('content', desc);
}

function tierLabel(t){
  const v = String(t||'').toLowerCase();
  if (v === 'tier1') return 'Tier 1';
  if (v === 'tier2') return 'Tier 2';
  return v || 'Source';
}

function sentimentLabel(score){
  const v = Number(score);
  if (!Number.isFinite(v)) return { text: 'Sentiment: —', color: 'var(--muted)' };
  if (v >= 0.25) return { text: 'Sentiment: Positive', color: '#22c55e' };
  if (v <= -0.25) return { text: 'Sentiment: Negative', color: '#e57368' };
  return { text: 'Sentiment: Neutral', color: '#e8a020' };
}

function fmtDate(iso){
  try { return new Date(iso).toLocaleString('en-NG'); } catch { return iso || ''; }
}

async function loadItem(){
  const { data, error } = await supabase
    .from('news_items')
    .select('id,title,url,published_at,created_at,summary,sentiment_score,topic,raw_json,image_url,image_alt,author,site_name,content_text,content_html,news_sources(name,credibility_tier)')
    .eq('id', id)
    .single();
  if (error) throw error;
  return data;
}

try{
  const it = await loadItem();
  const title = it?.title || 'News';
  document.getElementById('title').textContent = title;
  setMetaTitle(title);

  const src = it?.news_sources?.name || '';
  const author = it?.author || '';
  const siteName = it?.site_name || '';
  const tier = tierLabel(it?.news_sources?.credibility_tier);
  const when = fmtDate(it.published_at || it.created_at);
  document.getElementById('meta').textContent = [src || siteName, author, when].filter(Boolean).join(' · ');

  const srcP = document.getElementById('source-pill');
  if (src) { srcP.style.display = ''; srcP.textContent = src; }
  const tierP = document.getElementById('tier-pill');
  tierP.style.display = ''; tierP.textContent = tier;
  const topicP = document.getElementById('topic-pill');
  if (it.topic) { topicP.style.display = ''; topicP.textContent = String(it.topic); }
  const sentP = document.getElementById('sentiment-pill');
  const s = sentimentLabel(it.sentiment_score);
  sentP.style.display = ''; sentP.textContent = s.text; sentP.style.borderColor = s.color + '55'; sentP.style.color = s.color;

  const hero = document.getElementById('hero');
  const img = sanitizeUrl(it.image_url || '');
  if (hero && img) {
    hero.style.display = '';
    hero.innerHTML = `<img src="${escapeHtml(img)}" alt="${escapeHtml(it.image_alt || it.title || 'News image')}" style="width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,.08);">`;
  }

  const contentHtml = String(it.content_html || '').trim();
  const contentText = String(it.content_text || '').trim();
  const sum = String(it.summary || '').trim();
  const rawDesc = String((it.raw_json && it.raw_json.description) || '').trim();
  const summaryText = sum || rawDesc;
  const main = contentHtml || (contentText ? `<div>${escapeHtml(contentText).replace(/\n\n+/g,'</div><div style="margin-top:.85rem;">').replace(/\n/g,'<br>')}</div>` : '');
  document.getElementById('summary').innerHTML = main
    ? (contentHtml ? `<div>${contentHtml}</div>` : main)
    : (summaryText ? `<div>${escapeHtml(summaryText).replace(/\n\n+/g,'</div><div style="margin-top:.85rem;">').replace(/\n/g,'<br>')}</div>` : `<div style="color:var(--muted);">No content available yet.</div>`);

  const details = [];
  if (!contentHtml && !contentText && rawDesc && sum && rawDesc !== sum) {
    details.push(`<div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem;">Extracted Details</div>`);
    details.push(`<div>${escapeHtml(rawDesc).replace(/\n\n+/g,'</div><div style="margin-top:.85rem;">').replace(/\n/g,'<br>')}</div>`);
  }
  document.getElementById('details').innerHTML = details.join('');

  setMetaDesc((contentText || summaryText || title).slice(0, 220));
  const url = sanitizeUrl(it.url);
  const btn = document.getElementById('original-link');
  if (url) { btn.style.display = ''; btn.href = url; }
}catch(e){
  showToast('Unable to load this news item.', 'error');
  document.getElementById('title').textContent = 'News item not found';
  document.getElementById('summary').innerHTML = '<div class="empty">This news item does not exist or is not available.</div>';
}
</script>
</body>
</html>
