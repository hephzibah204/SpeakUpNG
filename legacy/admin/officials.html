<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officials — evote.ng Admin</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="toast" id="toast"></div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="official-modal" onclick="if(event.target===this)closeOfficialModal()">
  <div class="modal" style="max-width:640px;">
    <div class="modal-header">
      <h2 id="modal-title">Add Official</h2>
      <button class="modal-close" onclick="closeOfficialModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="span2">
          <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:.3rem;">
            <label class="form-label" style="margin:0;">Full Name *</label>
            <button class="btn btn-ghost btn-sm" id="btn-ai-fill" onclick="autoFillProfile()" style="padding:3px 10px;font-size:.7rem;color:var(--green-light);border-color:rgba(0,179,104,.3);display:flex;align-items:center;gap:.3rem;">
              ✨ AI Auto-Fill
            </button>
          </div>
          <input type="text" class="form-control" id="f-name" placeholder="e.g. Bola Ahmed Tinubu or NAFDAC">
        </div>
        <div>
          <label class="form-label">Common Name</label>
          <input type="text" class="form-control" id="f-common" placeholder="e.g. Tinubu">
        </div>
        <div>
          <label class="form-label">Party</label>
          <input type="text" class="form-control" id="f-party" placeholder="e.g. APC, PDP, LP">
        </div>
        <div class="span2">
          <label class="form-label">Role / Position *</label>
          <input type="text" class="form-control" id="f-role" placeholder="e.g. Governor, Lagos State">
        </div>
        <div>
          <label class="form-label">Tier *</label>
          <select class="form-control" id="f-tier">
            <option value="">Select tier</option>
            <option value="federal_executive">Federal Executive</option>
            <option value="federal_legislature">National Assembly</option>
            <option value="federal_judiciary">Federal Judiciary</option>
            <option value="state_executive">State Executive</option>
            <option value="state_legislature">State Assembly</option>
            <option value="local_government">Local Government</option>
            <option value="federal_agency">Federal Agency</option>
            <option value="state_agency">State Agency</option>
            <option value="military_security">Military & Security</option>
          </select>
        </div>
        <div class="span2" id="agency-hint" style="display:none;color:var(--muted);font-size:.78rem;line-height:1.3;">
          Add agencies (NAFDAC, NNPC, IBEDC) as their own records (role like “Agency”). Add the head separately (role like “DG/MD/CEO”).
        </div>
        <div>
          <label class="form-label">State</label>
          <select class="form-control" id="f-state">
            <option value="">Federal / All States</option>
          </select>
        </div>
        <div>
          <label class="form-label">Status</label>
          <select class="form-control" id="f-status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="suspended">Suspended</option>
          </select>
        </div>
        <div>
          <label class="form-label">Office Start Date</label>
          <input type="date" class="form-control" id="f-start">
        </div>
        <div class="span2">
          <label class="form-label">Photo / Logo URL</label>
          <input type="url" class="form-control" id="f-photo" placeholder="https://...">
        </div>
        <div class="span2">
          <label class="form-label">Bio</label>
          <textarea class="form-control" id="f-bio" placeholder="Brief biography..."></textarea>
        </div>
        <div>
          <label class="form-label">Twitter / X</label>
          <input type="text" class="form-control" id="f-twitter" placeholder="@handle">
        </div>
        <div>
          <label class="form-label">Official Website</label>
          <input type="url" class="form-control" id="f-website" placeholder="https://...">
        </div>
        <div>
          <label class="form-label">Instagram</label>
          <input type="text" class="form-control" id="f-instagram" placeholder="@handle">
        </div>
        <div>
          <label class="form-label">TikTok</label>
          <input type="text" class="form-control" id="f-tiktok" placeholder="@handle">
        </div>
        <div class="span2">
          <label class="form-label">Facebook (URL)</label>
          <input type="url" class="form-control" id="f-facebook" placeholder="https://facebook.com/...">
        </div>
        <div class="span2">
          <label class="form-label">YouTube (URL)</label>
          <input type="url" class="form-control" id="f-youtube" placeholder="https://youtube.com/...">
        </div>
        <div class="span2">
          <label class="form-label">LinkedIn (URL)</label>
          <input type="url" class="form-control" id="f-linkedin" placeholder="https://linkedin.com/in/...">
        </div>
        <div>
          <label class="form-label">Contact Email</label>
          <input type="email" class="form-control" id="f-email" placeholder="office@...">
        </div>
        <div>
          <label class="form-label">Contact Phone</label>
          <input type="tel" class="form-control" id="f-phone" placeholder="+234...">
        </div>
      </div>
      <button class="submit-btn" id="save-official-btn" onclick="saveOfficial()">Save Official</button>
    </div>
  </div>
</div>

<div class="admin-main">
  <div class="admin-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;">
    <div>
      <div class="admin-title">Officials</div>
      <div class="admin-sub">Manage all government officials in the database</div>
    </div>
    <button class="btn btn-green" onclick="openAddModal()">+ Add Official</button>
  </div>

  <div class="admin-search">
    <input type="text" id="search" placeholder="Search name or role..." oninput="applyFilter()">
    <select id="tier-filter" onchange="applyFilter()">
      <option value="">All Tiers</option>
      <option value="federal_executive">Federal Executive</option>
      <option value="federal_legislature">National Assembly</option>
      <option value="federal_judiciary">Judiciary</option>
      <option value="state_executive">State Executive</option>
      <option value="local_government">Local Govt</option>
      <option value="federal_agency">Agencies</option>
      <option value="military_security">Military</option>
    </select>
    <select id="status-filter" onchange="applyFilter()">
      <option value="">All Status</option>
      <option value="active">Active</option>
      <option value="inactive">Inactive</option>
      <option value="suspended">Suspended</option>
    </select>
    <span id="count-label" style="color:var(--muted);font-size:.82rem;margin-left:auto;"></span>
  </div>

  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Official</th>
          <th>Role</th>
          <th>Tier</th>
          <th>State</th>
          <th>Rating</th>
          <th>Reports</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="officials-body">
        <tr><td colspan="8"><div class="loading"><div class="spinner"></div></div></td></tr>
      </tbody>
    </table>
  </div>
  <div id="pagination" style="display:flex;gap:.5rem;margin-top:1.2rem;flex-wrap:wrap;"></div>
</div>

<script type="module">
import { supabase, requireAuth, sidebarHTML, showToast, fmt, TIER_LABELS, TIER_COLORS, scoreColor, wireSignOut } from './js/admin-common.js';

const session = await requireAuth();
document.getElementById('sidebar-mount').innerHTML = sidebarHTML('officials', session.user.email);
wireSignOut();

let allData = [], filtered = [], states = [], editingId = null;
let page = 1; const perPage = 20;

function isAgencyTier(t) {
  return String(t || '').includes('agency');
}

function updateAgencyHints() {
  const tier = document.getElementById('f-tier')?.value || '';
  const hint = document.getElementById('agency-hint');
  if (hint) hint.style.display = isAgencyTier(tier) ? '' : 'none';
  const name = document.getElementById('f-name');
  const role = document.getElementById('f-role');
  if (!name || !role) return;
  if (isAgencyTier(tier)) {
    name.placeholder = 'e.g. NAFDAC, NNPC, IBEDC';
    role.placeholder = 'e.g. Agency (Body) OR DG/MD/CEO (Head)';
  } else {
    name.placeholder = 'e.g. Bola Ahmed Tinubu';
    role.placeholder = 'e.g. Governor, Lagos State';
  }
}

function avatarImgStyle(tier) {
  return String(tier || '').includes('agency')
    ? 'width:100%;height:100%;border-radius:50%;object-fit:contain;background:#fff;padding:4px;'
    : 'width:100%;height:100%;border-radius:50%;object-fit:cover;';
}

// Load states into selects
async function loadStates() {
  const { data, error } = await supabase.from('states').select('id,name').order('name');
  if (error) { showToast('Unable to load states.','error'); return; }
  states = data || [];
  const sel = document.getElementById('f-state');
  states.forEach(s => { const o = document.createElement('option'); o.value=s.id; o.textContent=s.name; sel.appendChild(o); });
}

async function loadOfficials() {
  const { data, error } = await supabase.from('officials')
    .select('id,full_name,common_name,role,tier,party,status,rating_avg,rating_count,report_count,office_start,photo_url,bio,social_twitter,website,social_instagram,social_facebook,social_youtube,social_linkedin,social_tiktok,contact_email,contact_phone,states(id,name),state_id')
    .order('full_name');
  if (error) {
    document.getElementById('officials-body').innerHTML = '<tr><td colspan="8"><div class="empty">Unable to load officials.</div></td></tr>';
    document.getElementById('count-label').textContent = 'Unable to load officials';
    return;
  }
  allData = data || [];
  applyFilter();
}

window.applyFilter = () => {
  const q = document.getElementById('search').value.toLowerCase();
  const tier = document.getElementById('tier-filter').value;
  const status = document.getElementById('status-filter').value;
  filtered = allData.filter(o => {
    const matchQ = !q || o.full_name.toLowerCase().includes(q) || o.role.toLowerCase().includes(q);
    const matchT = !tier || o.tier === tier;
    const matchS = !status || o.status === status;
    return matchQ && matchT && matchS;
  });
  page = 1;
  render();
};

function render() {
  const total = filtered.length;
  document.getElementById('count-label').textContent = `${fmt(total)} official${total!==1?'s':''}`;
  const slice = filtered.slice((page-1)*perPage, page*perPage);
  if (!slice.length) { document.getElementById('officials-body').innerHTML='<tr><td colspan="8"><div class="empty">No officials found.</div></td></tr>'; renderPag(0); return; }
  document.getElementById('officials-body').innerHTML = slice.map(o=>{
    const color = TIER_COLORS[o.tier]||'#888';
    const initials = o.full_name.split(' ').slice(0,2).map(w=>w[0]).join('');
    const rating = parseFloat(o.rating_avg)||0;
    return `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:.6rem;">
          <div class="avatar" style="width:32px;height:32px;font-size:.72rem;background:${color}22;color:${color};">
            ${o.photo_url?`<img src="${o.photo_url}" style="${avatarImgStyle(o.tier)}">`:`${initials}`}
          </div>
          <div>
            <div style="font-weight:500;font-size:.85rem;">${o.full_name}</div>
            ${o.party?`<div style="font-size:.7rem;color:var(--muted);">${o.party}</div>`:''}
          </div>
        </div>
      </td>
      <td style="font-size:.8rem;color:var(--muted);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${o.role}</td>
      <td><span class="tier-badge" style="color:${color};border-color:${color}44;background:${color}11;font-size:.58rem;">${TIER_LABELS[o.tier]||o.tier}</span></td>
      <td style="font-size:.8rem;color:var(--muted);">${o.states?.name||'Federal'}</td>
      <td><span style="color:${rating?scoreColor(rating):'var(--muted)'};font-weight:700;">${rating?'★ '+rating.toFixed(1):'—'}</span> <span style="color:var(--muted);font-size:.72rem;">(${fmt(o.rating_count)})</span></td>
      <td>${o.report_count>0?`<span style="color:#e57368;">⚠ ${o.report_count}</span>`:'<span style="color:var(--border);">—</span>'}</td>
      <td><span class="status-badge s-${o.status}">${o.status}</span></td>
      <td>
        <div class="action-btns">
          <button class="action-btn action-edit" onclick="openEditModal('${o.id}')">Edit</button>
          <button class="action-btn action-delete" onclick="deleteOfficial('${o.id}','${o.full_name.replace(/'/g,"\\'")}')">Delete</button>
        </div>
      </td>
    </tr>`;
  }).join('');
  renderPag(total);
}

function renderPag(total) {
  const pages = Math.ceil(total/perPage);
  const el = document.getElementById('pagination');
  if (pages<=1){el.innerHTML='';return;}
  el.innerHTML = Array.from({length:pages},(_,i)=>i+1).map(p=>`<button class="tab ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`).join('');
}
window.goPage=(p)=>{page=p;render();};

// ── MODAL ──
window.openAddModal = () => {
  editingId = null;
  document.getElementById('modal-title').textContent='Add Official';
  ['name','common','party','role','tier','status','start','photo','bio','twitter','website','instagram','facebook','youtube','linkedin','tiktok','email','phone'].forEach(f=>{
    const el=document.getElementById('f-'+f); if(el) el.value = f==='status'?'active':'';
  });
  document.getElementById('f-state').value='';
  updateAgencyHints();
  document.getElementById('official-modal').classList.add('open');
};

window.openEditModal = (id) => {
  editingId = id;
  const o = allData.find(x=>x.id===id);
  if (!o) return;
  document.getElementById('modal-title').textContent='Edit Official';
  document.getElementById('f-name').value = o.full_name||'';
  document.getElementById('f-common').value = o.common_name||'';
  document.getElementById('f-party').value = o.party||'';
  document.getElementById('f-role').value = o.role||'';
  document.getElementById('f-tier').value = o.tier||'';
  document.getElementById('f-state').value = o.state_id||'';
  document.getElementById('f-status').value = o.status||'active';
  document.getElementById('f-start').value = o.office_start||'';
  document.getElementById('f-photo').value = o.photo_url||'';
  document.getElementById('f-bio').value = o.bio||'';
  document.getElementById('f-twitter').value = o.social_twitter||'';
  document.getElementById('f-website').value = o.website||'';
  document.getElementById('f-instagram').value = o.social_instagram||'';
  document.getElementById('f-facebook').value = o.social_facebook||'';
  document.getElementById('f-youtube').value = o.social_youtube||'';
  document.getElementById('f-linkedin').value = o.social_linkedin||'';
  document.getElementById('f-tiktok').value = o.social_tiktok||'';
  document.getElementById('f-email').value = o.contact_email||'';
  document.getElementById('f-phone').value = o.contact_phone||'';
  updateAgencyHints();
  document.getElementById('official-modal').classList.add('open');
};

window.closeOfficialModal = () => document.getElementById('official-modal').classList.remove('open');

window.autoFillProfile = async () => {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('Type a name first', 'warn'); return; }
  
  const btn = document.getElementById('btn-ai-fill');
  const ogHtml = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm" style="border-color:var(--green-light);border-top-color:transparent;"></span> Searching...';
  
  try {
    const res = await fetch('/api/fetch-official-profile.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`
      },
      body: JSON.stringify({ name })
    });
    
    const data = await res.json();
    if (!res.ok || !data.ok) throw new Error(data.error || 'AI generation failed');
    
    const p = data.profile;
    if (p.common_name) document.getElementById('f-common').value = p.common_name;
    if (p.party) document.getElementById('f-party').value = p.party;
    if (p.role) document.getElementById('f-role').value = p.role;
    if (p.tier) {
      const ts = document.getElementById('f-tier');
      if (Array.from(ts.options).some(o => o.value === p.tier)) ts.value = p.tier;
    }
    if (p.bio) document.getElementById('f-bio').value = p.bio;
    if (p.social_twitter) document.getElementById('f-twitter').value = p.social_twitter;
    if (p.website) document.getElementById('f-website').value = p.website;
    if (p.social_instagram) document.getElementById('f-instagram').value = p.social_instagram;
    if (p.social_facebook) document.getElementById('f-facebook').value = p.social_facebook;
    if (p.social_youtube) document.getElementById('f-youtube').value = p.social_youtube;
    if (p.social_linkedin) document.getElementById('f-linkedin').value = p.social_linkedin;
    if (p.social_tiktok) document.getElementById('f-tiktok').value = p.social_tiktok;
    if (p.contact_email) document.getElementById('f-email').value = p.contact_email;
    if (p.contact_phone) document.getElementById('f-phone').value = p.contact_phone;
    if (p.office_start) document.getElementById('f-start').value = p.office_start;
    if (p.photo_url) document.getElementById('f-photo').value = p.photo_url;
    
    updateAgencyHints();
    showToast('Profile Auto-Filled! ✓');
  } catch (e) {
    showToast(`AI Error: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = ogHtml;
  }
};

window.saveOfficial = async () => {
  const name = document.getElementById('f-name').value.trim();
  const role = document.getElementById('f-role').value.trim();
  const tier = document.getElementById('f-tier').value;
  if (!name||!role||!tier) { showToast('Name, role and tier are required.','error'); return; }
  const btn = document.getElementById('save-official-btn');
  btn.disabled=true; btn.textContent='Saving...';
  const payload = {
    full_name: name,
    common_name: document.getElementById('f-common').value.trim()||null,
    party: document.getElementById('f-party').value.trim()||null,
    role, tier,
    state_id: document.getElementById('f-state').value||null,
    status: document.getElementById('f-status').value||'active',
    office_start: document.getElementById('f-start').value||null,
    photo_url: document.getElementById('f-photo').value.trim()||null,
    bio: document.getElementById('f-bio').value.trim()||null,
    social_twitter: document.getElementById('f-twitter').value.trim()||null,
    website: document.getElementById('f-website').value.trim()||null,
    social_instagram: document.getElementById('f-instagram').value.trim()||null,
    social_facebook: document.getElementById('f-facebook').value.trim()||null,
    social_youtube: document.getElementById('f-youtube').value.trim()||null,
    social_linkedin: document.getElementById('f-linkedin').value.trim()||null,
    social_tiktok: document.getElementById('f-tiktok').value.trim()||null,
    contact_email: document.getElementById('f-email').value.trim()||null,
    contact_phone: document.getElementById('f-phone').value.trim()||null,
  };
  let error;
  if (editingId) { ({error} = await supabase.from('officials').update(payload).eq('id',editingId)); }
  else { ({error} = await supabase.from('officials').insert(payload)); }
  btn.disabled=false; btn.textContent='Save Official';
  if (error) { showToast('Error: '+error.message,'error'); return; }
  showToast(editingId?'Official updated ✓':'Official added ✓');
  closeOfficialModal(); loadOfficials();
};

window.deleteOfficial = async (id, name) => {
  if (!confirm(`Delete "${name}"? This will also remove all their ratings and reports. This cannot be undone.`)) return;
  const { error } = await supabase.from('officials').delete().eq('id',id);
  if (error) { showToast('Error deleting: '+error.message,'error'); return; }
  showToast(`${name} removed ✓`);
  loadOfficials();
};

await loadStates();
document.getElementById('f-tier')?.addEventListener('change', updateAgencyHints);
updateAgencyHints();
loadOfficials();
</script>
</body>
</html>
