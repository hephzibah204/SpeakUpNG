# Cloudflare Workers configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "speakupng"
main = "worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "speakupng-db"
database_id = "4696a91d-5bae-438f-a7d9-a5258d7f2072"

# Environment variables
[vars]
ENVIRONMENT = "production"
NEXT_PUBLIC_APP_URL = "https://evote.ng"

# Cron triggers for scheduled tasks
[triggers]
crons = ["*/15 * * * *"]  # Run news ingestion every 15 minutes

# Routes configuration (top-level, not under triggers)
[[routes]]
pattern = "evote.ng/*"
zone_id = "your-zone-id-here"

[[routes]]
pattern = "api.evote.ng/*"
zone_id = "your-zone-id-here"

# Logging
[observability]
enabled = true
head_sampling_rate = 1

# Environment-specific overrides
[env.staging]
name = "speakupng-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
NEXT_PUBLIC_APP_URL = "https://staging.evote.ng"

[env.production]
name = "speakupng-production"
[env.production.vars]
ENVIRONMENT = "production"
NEXT_PUBLIC_APP_URL = "https://evote.ng"
