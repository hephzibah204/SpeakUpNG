<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaijaRate Blog - Civic Insights and Governance Analysis</title>
<meta name="description" content="Read NaijaRate blog explainers on Nigerian governance, election trends, policy performance, and smarter citizen accountability.">
<meta name="keywords" content="Nigeria governance blog, policy analysis Nigeria, civic education, NaijaRate blog">
<meta name="robots" content="index,follow,max-image-preview:large">
<link rel="canonical" href="/blog" id="canonical-link">
<meta property="og:type" content="blog">
<meta property="og:site_name" content="NaijaRate">
<meta property="og:locale" content="en_NG">
<meta property="og:title" content="NaijaRate Blog - Civic Insights and Governance Analysis">
<meta property="og:description" content="Actionable explainers on leadership performance, elections, and public accountability in Nigeria.">
<meta property="og:image" content="/images/naijarate-og.jpg">
<meta property="og:url" content="/blog" id="og-url">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="NaijaRate Blog - Civic Insights and Governance Analysis">
<meta name="twitter:description" content="Actionable explainers on leadership performance, elections, and public accountability in Nigeria.">
<meta name="twitter:image" content="/images/naijarate-og.jpg">
<link rel="stylesheet" href="css/style.css">
<style>
  .blog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 1rem;
  }
  .blog-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    overflow: hidden;
  }
  .featured-img {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: .75rem;
    border: 1px solid var(--border);
    background: #101310;
  }
  .blog-meta {
    font-size: .72rem;
    color: var(--muted);
    margin-bottom: .45rem;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .blog-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.02rem;
    margin-bottom: .45rem;
  }
  .blog-excerpt {
    color: var(--muted);
    font-size: .85rem;
    margin-bottom: .65rem;
  }
  .blog-body {
    margin-top: 1.4rem;
    display: grid;
    gap: 1rem;
  }
</style>
<script>
  (function setCanonicalMeta() {
    var origin = window.location.origin || '';
    var url = origin + '/blog';
    var canonical = document.getElementById('canonical-link');
    var ogUrl = document.getElementById('og-url');
    if (canonical) canonical.href = url;
    if (ogUrl) ogUrl.setAttribute('content', url);
  })();
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Blog",
  "name": "NaijaRate Blog",
  "url": "/blog",
  "description": "Governance explainers and civic accountability analysis for Nigeria.",
  "inLanguage": "en-NG"
}
</script>
<script type="application/ld+json" id="ld-items"></script>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">🇳🇬 Naija<span>Rate</span> <span class="badge">Beta</span></a>
  <div class="nav-links">
    <a href="/" class="nav-link show-mobile">Officials</a>
    <a href="/leaderboard" class="nav-link">Rankings</a>
    <a href="/polls" class="nav-link">Polls</a>
    <a href="/blog" class="nav-link active">Blog</a>
    <a href="/news" class="nav-link">News</a>
  </div>
</nav>

<div class="section">
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">NaijaRate Blog</h1>
      <p class="page-sub">Civic explainers, governance analysis, and practical citizen accountability guides.</p>
    </div>

    <div class="blog-grid" id="blog-grid" aria-live="polite"></div>
    <div id="blog-empty" class="card" style="display:none;">
      <h2 style="margin-bottom:.4rem;">No posts yet</h2>
      <p class="muted">Check back soon.</p>
    </div>
  </div>
</div>

<footer class="site-footer">
  <strong>NaijaRate</strong> — Civic insights for informed public participation<br>
  <a href="/" style="color:var(--green-light);">Officials</a> ·
  <a href="/leaderboard" style="color:var(--green-light);">Rankings</a> ·
  <a href="/news" style="color:var(--green-light);">News Updates</a>
</footer>
<script type="module">
  const gridEl = document.getElementById('blog-grid');
  const emptyEl = document.getElementById('blog-empty');
  const ldItemsEl = document.getElementById('ld-items');

  function formatDate(iso) {
    try {
      return new Date(iso).toLocaleDateString('en-NG', { year: 'numeric', month: 'short', day: 'numeric' });
    } catch {
      return iso || '';
    }
  }

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  async function loadPosts() {
    const base = window.location.pathname.startsWith('/public/') ? '/public/data/' : '/data/';
    const res = await fetch(base + 'blog-posts.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('Failed to load posts');
    const data = await res.json();
    return (data.posts || []).slice().sort((a, b) => String(b.published_at || '').localeCompare(String(a.published_at || '')));
  }

  function render(posts) {
    if (!posts.length) {
      if (emptyEl) emptyEl.style.display = '';
      return;
    }

    gridEl.innerHTML = posts.map((p) => {
      const url = '/blog/' + encodeURIComponent(p.slug);
      const when = formatDate(p.published_at);
      return `
        <article class="blog-card card-hover">
          <a href="${url}" aria-label="${esc(p.title)}">
            <img class="featured-img" loading="lazy" src="${esc(p.featured_image)}" alt="${esc(p.featured_image_alt || p.title)}">
          </a>
          <div class="blog-meta">${esc(p.category)} · ${esc(when)}</div>
          <h2 class="blog-title"><a href="${url}">${esc(p.title)}</a></h2>
          <p class="blog-excerpt">${esc(p.excerpt)}</p>
          <a href="${url}" style="color:var(--green-light);font-size:.82rem;">Read article -</a>
        </article>
      `;
    }).join('');

    if (ldItemsEl) {
      const origin = window.location.origin || '';
      ldItemsEl.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "ItemList",
        "itemListElement": posts.map((p, idx) => ({
          "@type": "ListItem",
          "position": idx + 1,
          "url": origin + "/blog/" + p.slug,
          "name": p.title
        }))
      });
    }
  }

  (async function init() {
    try {
      const posts = await loadPosts();
      render(posts);
    } catch (e) {
      if (emptyEl) emptyEl.style.display = '';
    }
  })();
</script>
</body>
</html>
