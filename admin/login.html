<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — evote.ng</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px;
    box-shadow: var(--shadow);
  }
  .login-logo { text-align:center; margin-bottom:2rem; }
  .login-logo h1 { font-size:1.5rem; }
  .login-logo p { color:var(--muted); font-size:.82rem; margin-top:.3rem; }
  .error-msg { background:rgba(192,57,43,.15); border:1px solid rgba(192,57,43,.3); color:#e57368; border-radius:8px; padding:.75rem 1rem; font-size:.85rem; margin-bottom:1rem; display:none; }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="login-card">
  <div class="login-logo">
    <h1>🇳🇬 evote.ng</h1>
    <p>Admin Dashboard — Secure Access</p>
  </div>
  <div class="error-msg" id="err-msg"></div>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" class="form-control" id="email" placeholder="admin@evote.ng">
  </div>
  <div class="form-group">
    <label class="form-label">Password</label>
    <input type="password" class="form-control" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="submit-btn" id="login-btn" onclick="login()">Sign In</button>
  <p style="text-align:center;margin-top:1.5rem;font-size:.76rem;color:var(--muted);">
    🔒 Admin access only. Unauthorized access is prohibited.
  </p>
</div>

<script type="module">
import { supabase, showToast } from '../js/supabase-client.js';

// Redirect if already logged in
const { data: { session } } = await supabase.auth.getSession();
if (session) window.location.href = '/admin/dashboard';

window.login = async () => {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('err-msg');
  if (!email || !password) { err.textContent='Please enter email and password.'; err.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Signing in...'; err.style.display='none';
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) { err.textContent=error.message; err.style.display='block'; btn.disabled=false; btn.textContent='Sign In'; return; }
  window.location.href = '/admin/dashboard';
};
</script>
</body>
</html>
