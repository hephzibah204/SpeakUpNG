<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports — NaijaRate Admin</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="toast" id="toast"></div>

<!-- Detail Modal -->
<div class="modal-overlay" id="report-detail-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal" style="max-width:580px;">
    <div class="modal-header">
      <h2>🚨 Report Detail</h2>
      <button class="modal-close" onclick="document.getElementById('report-detail-modal').classList.remove('open')">✕</button>
    </div>
    <div class="modal-body" id="report-detail-body"></div>
  </div>
</div>

<div class="admin-main">
  <div class="admin-header">
    <div class="admin-title">Misconduct Reports</div>
    <div class="admin-sub">Review, verify, dismiss or escalate citizen reports</div>
  </div>

  <div class="admin-search">
    <select id="status-filter" onchange="loadReports()">
      <option value="pending">Pending</option>
      <option value="verified">Verified</option>
      <option value="escalated">Escalated</option>
      <option value="dismissed">Dismissed</option>
      <option value="">All</option>
    </select>
    <span id="count-label" style="color:var(--muted);font-size:.82rem;margin-left:auto;"></span>
  </div>

  <div class="admin-table-wrap">
    <table class="admin-table">
      <thead>
        <tr>
          <th>Official</th>
          <th>Categories</th>
          <th>Description</th>
          <th>Status</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="reports-body">
        <tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>
      </tbody>
    </table>
  </div>
  <div id="pagination" style="display:flex;gap:.5rem;margin-top:1.2rem;flex-wrap:wrap;"></div>
</div>

<script type="module">
import { supabase, requireAuth, sidebarHTML, showToast, fmt, wireSignOut } from './js/admin-common.js';

const session = await requireAuth();
document.getElementById('sidebar-mount').innerHTML = sidebarHTML('reports', session.user.email);
wireSignOut();

let reports = [], page = 1; const perPage = 20;

window.loadReports = async () => {
  const status = document.getElementById('status-filter').value;
  let q = supabase.from('reports')
    .select('id,categories,description,evidence_url,status,admin_notes,created_at,officials(full_name,role)')
    .order('created_at',{ascending:false});
  if (status) q = q.eq('status',status);
  const { data, error } = await q;
  if (error) {
    document.getElementById('reports-body').innerHTML = '<tr><td colspan="6"><div class="empty">Unable to load reports.</div></td></tr>';
    document.getElementById('count-label').textContent = 'Unable to load reports';
    return;
  }
  reports = data || [];
  document.getElementById('count-label').textContent = `${fmt(reports.length)} report${reports.length!==1?'s':''}`;
  page=1; render();
};

function render() {
  const slice = reports.slice((page-1)*perPage, page*perPage);
  if (!slice.length) { document.getElementById('reports-body').innerHTML='<tr><td colspan="6"><div class="empty">No reports found.</div></td></tr>'; renderPag(0); return; }
  document.getElementById('reports-body').innerHTML = slice.map(r=>`
    <tr>
      <td>
        <div style="font-weight:500;font-size:.84rem;">${r.officials?.full_name||'—'}</div>
        <div style="font-size:.72rem;color:var(--muted);">${r.officials?.role||''}</div>
      </td>
      <td style="font-size:.76rem;">
        ${(r.categories||[]).map(c=>`<span style="background:rgba(192,57,43,.12);color:#e57368;padding:1px 5px;border-radius:3px;margin:1px;display:inline-block;">${c}</span>`).join('')}
      </td>
      <td style="font-size:.8rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);">${r.description}</td>
      <td><span class="status-badge s-${r.status}">${r.status}</span></td>
      <td style="color:var(--muted);font-size:.75rem;">${new Date(r.created_at).toLocaleDateString('en-NG')}</td>
      <td>
        <div class="action-btns">
          <button class="action-btn action-view" onclick="viewReport('${r.id}')">View</button>
          ${r.status==='pending'?`
            <button class="action-btn action-edit" onclick="updateStatus('${r.id}','verified')">Verify</button>
            <button class="action-btn" style="background:rgba(192,57,43,.2);color:#e57368;" onclick="updateStatus('${r.id}','escalated')">Escalate</button>
            <button class="action-btn action-delete" onclick="updateStatus('${r.id}','dismissed')">Dismiss</button>
          `:''}
        </div>
      </td>
    </tr>`).join('');
  renderPag(reports.length);
}

function renderPag(total) {
  const pages=Math.ceil(total/perPage), el=document.getElementById('pagination');
  if(pages<=1){el.innerHTML='';return;}
  el.innerHTML=Array.from({length:pages},(_,i)=>i+1).map(p=>`<button class="tab ${p===page?'active':''}" onclick="goPage(${p})">${p}</button>`).join('');
}
window.goPage=(p)=>{page=p;render();};

window.viewReport = (id) => {
  const r = reports.find(x=>x.id===id);
  if (!r) return;
  document.getElementById('report-detail-body').innerHTML = `
    <div style="background:rgba(255,255,255,.04);border-radius:8px;padding:1rem;margin-bottom:1.2rem;">
      <div style="font-weight:700;font-family:Syne,sans-serif;">${r.officials?.full_name||'Unknown'}</div>
      <div style="font-size:.8rem;color:var(--muted);">${r.officials?.role||''}</div>
    </div>
    <div class="form-group">
      <div class="form-label">Categories</div>
      <div>${(r.categories||[]).map(c=>`<span class="report-tag on" style="margin:2px;">${c}</span>`).join('')}</div>
    </div>
    <div class="form-group">
      <div class="form-label">Description</div>
      <div style="font-size:.88rem;line-height:1.7;color:var(--white);">${r.description}</div>
    </div>
    ${r.evidence_url?`<div class="form-group"><div class="form-label">Evidence</div><a href="${r.evidence_url}" target="_blank" style="color:var(--green-light);font-size:.85rem;">View Evidence →</a></div>`:''}
    <div class="form-group">
      <div class="form-label">Current Status</div>
      <span class="status-badge s-${r.status}">${r.status}</span>
    </div>
    <div class="form-group">
      <label class="form-label">Admin Notes</label>
      <textarea class="form-control" id="admin-notes" rows="3" placeholder="Add internal notes...">${r.admin_notes||''}</textarea>
    </div>
    <div style="display:flex;gap:.6rem;flex-wrap:wrap;">
      ${r.status!=='verified'?`<button class="btn btn-green btn-sm" onclick="updateStatusFromModal('${r.id}','verified')">✓ Verify</button>`:''}
      ${r.status!=='escalated'?`<button class="btn btn-sm" style="background:rgba(192,57,43,.2);color:#e57368;border:none;" onclick="updateStatusFromModal('${r.id}','escalated')">⬆ Escalate</button>`:''}
      ${r.status!=='dismissed'?`<button class="btn btn-ghost btn-sm" onclick="updateStatusFromModal('${r.id}','dismissed')">✕ Dismiss</button>`:''}
    </div>`;
  document.getElementById('report-detail-modal').classList.add('open');
};

window.updateStatusFromModal = async (id, status) => {
  const notes = document.getElementById('admin-notes')?.value.trim()||null;
  await updateStatus(id, status, notes);
  document.getElementById('report-detail-modal').classList.remove('open');
};

window.updateStatus = async (id, status, notes) => {
  const payload = { status, updated_at: new Date().toISOString() };
  if (notes !== undefined) payload.admin_notes = notes;
  const { error } = await supabase.from('reports').update(payload).eq('id',id);
  if (error) { showToast('Error: '+error.message,'error'); return; }
  showToast(`Report marked as ${status} ✓`);
  loadReports();
};

loadReports();
</script>
</body>
</html>
